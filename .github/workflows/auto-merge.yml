name: Auto Merge PRs
 
 on:
   pull_request_target:  # <-- Important: _target au lieu de pull_request
     types: [opened, synchronize, reopened]
 
 permissions:
   contents: write
   pull-requests: write
 
 jobs:
   auto-merge:
     runs-on: ubuntu-latest
     steps:
       - name: Merge PR
         run: gh pr merge --squash --admin "$PR_NUMBER" --repo "$REPO"
         env:
           PR_NUMBER: ${{ github.event.pull_request.number }}
           REPO: ${{ github.repository }}
           GH_TOKEN: ${{ secrets.PAT_TOKEN }}
